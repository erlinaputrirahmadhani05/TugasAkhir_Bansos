{% extends "dashboard.html" %} {% block page_title %}Tambah Data Warga{% endblock %} {% block content %}
<div class="page-content">
  <div class="content-card">
    <form class="user-form" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>NIK <span class="required">*</span></label>
          <input type="text" name="nik" required maxlength="16" placeholder="Masukkan NIK" value="{{ warga.nik if warga else '' }}" />
        </div>

        <div class="form-group">
          <label>Nama <span class="required">*</span></label>
          <input type="text" name="nama" placeholder="Masukkan Nama" required value="{{ warga.nama if warga else '' }}" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tanggal Lahir <span class="required">*</span></label>
          <input type="date" name="tanggal_lahir" required value="{{ warga.tanggal_lahir if warga else '' }}" />
        </div>

        <div class="form-group">
          <label>Nomor HP</label>
          <input type="text" name="nomor_hp" placeholder="Masukkan Nomor HP" value="{{ warga.nomor_hp if warga else '' }}" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>RT <span class="required">*</span></label>
          <input type="text" name="rt" placeholder="Masukkan RT" required value="{{ warga.rt if warga else '' }}" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Petugas Lapangan <span class="required">*</span></label>
            <select name="petugas_id">
              {% for p in petugas %}
              <option value="{{ p.id }}" {% if warga and warga.petugas_id == p.id %}selected{% endif %}>
                {{ p.nama_lengkap }}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Status <span class="required">*</span></label>
          <select name="status" required>
            <option value="" hidden>-- Pilih Status --</option>
            <option value="aktif" {% if warga and warga.status|lower == "aktif" %}selected{% endif %}>Aktif</option>
            <option value="tidak_aktif" {% if warga and warga.status|lower == "tidak_aktif" %}selected{% endif %}>Tidak Aktif</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('warga_penerima') }}" class="btn-cancel">Batal</a>
        <button type="submit" class="btn-submit">Simpan Data</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
