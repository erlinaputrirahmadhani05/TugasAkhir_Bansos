{% extends "dashboard.html" %}

{% block page_title %}Edit Akun{% endblock %}
{% block breadcrumb %}{% endblock %}

{% block content %}
<div class="page-content">
    <div class="content-card">
        <form class="user-form" method="POST" action="{{ url_for('edit_akun', user_id=user.id) }}">
            
            <!-- Nama Lengkap -->
            <div class="form-group full-width">
                <label for="nama_lengkap">Nama Lengkap <span class="required">*</span></label>
                <input type="text" id="nama_lengkap" name="nama_lengkap" 
                       value="{{ user.nama_lengkap }}" required 
                       placeholder="Masukkan nama lengkap">
            </div>

            <!-- Email & Password -->
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" 
                           value="{{ user.email }}" required 
                           placeholder="Masukkan email">
                </div>

                <div class="form-group">
                    <label for="password">
                        Password 
                        <span class="optional">(Kosongkan jika tidak diubah)</span>
                    </label>
                    <input type="password" id="password" name="password" 
                           placeholder="Masukkan password baru">
                </div>
            </div>

            <!-- Role & Status -->
            <div class="form-row">
                <div class="form-group">
                    <label for="role">Role <span class="required">*</span></label>
                    <select id="role" name="role" required>
                        <option value=""selected hidden>-- Pilih Role --</option>
                        <option value="petugas lapangan" 
                            {% if user.role == 'petugas lapangan' %}selected{% endif %}>
                            Petugas Lapangan
                        </option>
                        <option value="admin" 
                            {% if user.role == 'admin' %}selected{% endif %}>
                            Admin
                        </option>
                        <option value="superadmin" 
                            {% if user.role == 'superadmin' %}selected{% endif %}>
                            Super Administrator
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status_akun">Status Akun <span class="required">*</span></label>
                    <select id="status_akun" name="status_akun" required>
                        <option value=""selected hidden>-- Pilih Status --</option>
                        <option value="aktif" 
                            {% if user.status_akun == 'aktif' %}selected{% endif %}>
                            Aktif
                        </option>
                        <option value="nonaktif" 
                            {% if user.status_akun == 'nonaktif' %}selected{% endif %}>
                            Nonaktif
                        </option>
                    </select>
                </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <a href="{{ url_for('kelola_akun') }}" class="btn-cancel">Batal</a>
                <button type="submit" class="btn-submit">Update</button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
