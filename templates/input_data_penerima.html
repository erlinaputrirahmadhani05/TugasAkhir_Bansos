{% extends "dashboard.html" %}

{% block page_title %}Input Data Penerima{% endblock %}
{% block breadcrumb %}{% endblock %}

{% block content %}
<div class="page-content">
    <div class="content-card">
        <form method="POST" enctype="multipart/form-data" action="{{ url_for('input_data_penerima') }}">
            <div class="form-row">
                <div class="form-group">
                    <label>Warga <span class="required">*</span></label>
                    <select name="warga_id" required>
                        <option value="">-- Pilih Warga --</option>
                        {% for w in warga_list %}
                            <option value="{{ w.id }}">{{ w.nama }} | RT {{ w.rt }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tahun <span class="required">*</span></label>
                        <input type="number" name="tahun" value="{{ current_year }}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Tahap <span class="required">*</span></label>
                        <select name="tahap" required>
                            <option value="" disabled selected style="color: gray;">-- Pilih Tahap --</option>
                            <option value="1">Tahap 1: Januari - Maret</option>
                            <option value="2">Tahap 2: April - Juni</option>
                            <option value="3">Tahap 3: Juli - September</option>
                            <option value="4">Tahap 4: Oktober - Desember</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Tanggal Terima <span class="required">*</span></label>
                    <input type="date" name="tanggal_terima" required>
                </div>
                <div class="form-group">
                    <label>Bukti Terima <span class="required">*</span></label>
                    <input type="file" name="bukti_terima" accept="image/*" required />
                </div>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('dashboard') }}" class="btn-cancel">Batal</a>
                <button type="submit" class="btn-submit">Simpan Data</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
